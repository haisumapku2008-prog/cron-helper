<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CronHelper - Visual Cron Expression Generator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; padding: 2rem 1rem; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { margin-bottom: 2rem; text-align: center; }
        header h1 { font-size: 2.25rem; color: #0f172a; font-weight: 800; letter-spacing: -0.025em; }
        header p { color: #64748b; margin-top: 0.5rem; }
        .container { width: 100%; max-width: 700px; background: #ffffff; padding: 2rem; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .form-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.875rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; }
        select { padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; background-color: #fff; outline: none; transition: border-color 0.2s; color: #334155; }
        select:focus { border-color: #2563eb; }

        .result-box { background-color: #f1f5f9; padding: 1.5rem; border-radius: 12px; margin-top: 2rem; border: 1px dashed #cbd5e1; text-align: center; }
        .cron-output { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 2rem; font-weight: 700; color: #2563eb; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .human-readable { color: #475569; font-size: 1rem; font-weight: 500; }
    </style>
</head>
<body>

    <header>
        <h1>CronHelper</h1>
        <p>Generate precise, human-readable cron expressions visually.</p>
    </header>

    <div class="container">
        <div class="form-group">
            <label for="frequency">How often should this job run?</label>
            <select id="frequency">
                <option value="every-minute">Every minute</option>
                <option value="every-5-minutes">Every 5 minutes</option>
                <option value="hourly">Hourly (at the top of the hour)</option>
                <option value="daily">Daily (at midnight 12:00 AM)</option>
                <option value="weekly">Weekly (Sundays at midnight)</option>
                <option value="monthly">Monthly (1st of the month at midnight)</option>
            </select>
        </div>

        <div class="result-box">
            <div class="cron-output" id="cronString">* * * * *</div>
            <div class="human-readable" id="cronHuman">Runs every single minute.</div>
        </div>
    </div>

    <script>
        const frequencySelect = document.getElementById('frequency');
        const cronString = document.getElementById('cronString');
        const cronHuman = document.getElementById('cronHuman');

        const expressionMap = {
            'every-minute': { cron: '* * * * *', text: 'Runs every single minute.' },
            'every-5-minutes': { cron: '*/5 * * * *', text: 'Runs every 5 minutes.' },
            'hourly': { cron: '0 * * * *', text: 'Runs once an hour at the top of the hour.' },
            'daily': { cron: '0 0 * * *', text: 'Runs once a day at midnight (12:00 AM).' },
            'weekly': { cron: '0 0 * * 0', text: 'Runs once a week on Sundays at midnight.' },
            'monthly': { cron: '0 0 1 * *', text: 'Runs once a month on the 1st day at midnight.' }
        };

        frequencySelect.addEventListener('change', (e) => {
            const selection = expressionMap[e.target.value];
            if (selection) {
                cronString.innerText = selection.cron;
                cronHuman.innerText = selection.text;
            }
        });
    </script>
</body>
</html>
